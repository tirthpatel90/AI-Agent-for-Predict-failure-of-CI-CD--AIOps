name: AutoHeal CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: autoheal-ci/package-lock.json
      - name: Install dependencies
        run: |
          cd autoheal-ci
          npm install
      - name: Build Dashboard
        run: |
          cd autoheal-ci
          npm run build

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: autoheal-backend/requirements.txt
      - name: Install dependencies
        run: |
          cd autoheal-backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke Test (Server Startup)
        run: |
          cd autoheal-backend
          # Run uvicorn in background for 5 seconds to ensure it starts without errors
          python -m uvicorn main:app --port 8080 &
          sleep 5
          kill $!
